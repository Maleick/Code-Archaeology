name: Bug report
description: Report a problem with the Code Archaeology OpenCode plugin.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Code Archaeology. Do not include secrets, private code, or full `.archaeology/` state.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - survey
        - excavate
        - restore
        - install or CLI
        - documentation
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit SHA, or install source.
      placeholder: v2.0.2
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized logs or error output when useful.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, OpenCode version, package manager, and target language.
      placeholder: macOS 14, Node 20, OpenCode ..., npm ..., TypeScript
